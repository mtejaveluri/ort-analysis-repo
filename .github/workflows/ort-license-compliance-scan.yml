name: ORT License Compliance Scan

on:
  workflow_dispatch:
    inputs:
      vcs_url:
        description: 'Repository clone URL to scan (GitHub / GitLab). Use clone URL, not /tree/ URL.'
        required: true
        default: 'https://github.com/WebGoat/WebGoat.git'

      vcs_revision:
        description: 'Branch/Tag/Commit to scan (optional). Example: main or v1.2.3 or a commit SHA.'
        required: false
        default: ''

      github_token:
        description: 'GitHub Personal Access Token (only needed for private GitHub repos)'
        required: false
        default: ''

      gitlab_token:
        description: 'GitLab Personal Access Token (only needed for private GitLab repos)'
        required: false
        default: ''

jobs:
  ort-scan:
    runs-on: ubuntu-latest
    name: ORT License Compliance Check
    permissions:
      contents: read
      security-events: write

    steps:
      # 1) Checkout THIS repo to get your ORT config files
      - name: Checkout ORT config repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: ".ort-config"

      # 2) Place ORT config where ORT expects it
      - name: Setup ORT configuration files
        run: |
          set -euo pipefail

          # Create ORT config directory
          mkdir -p "$HOME/.ort/config"

          # Move fetched default config into place
          mv .ort-config "$HOME/.ort/config/.ort-config"

          # Copy evaluator rules and license classifications into ORT config directory
          cp "$HOME/.ort/config/.ort-config/evaluator.rules.kts" "$HOME/.ort/config/evaluator.rules.kts"
          cp "$HOME/.ort/config/.ort-config/license-classifications.yml" "$HOME/.ort/config/license-classifications.yml"

          echo "ORT configuration files setup complete"

      # 3) Configure Git credentials for private GitHub repo access (ONLY if GitHub token is provided)
      - name: Configure Git credentials for private GitHub repository access
        if: github.event.inputs.github_token != ''
        run: |
          set -euo pipefail

          echo "Configuring GitHub token auth..."
          git config --global url."https://${{ github.event.inputs.github_token }}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://oauth2:${{ github.event.inputs.github_token }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper store

          echo "https://oauth2:${{ github.event.inputs.github_token }}@github.com" > ~/.git-credentials
          echo "https://${{ github.event.inputs.github_token }}@github.com" >> ~/.git-credentials

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -t rsa github.com >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 600 ~/.git-credentials

      # 4) Configure Git credentials for private GitLab repo access (ONLY if GitLab token is provided)
      - name: Configure Git credentials for private GitLab repository access
        if: github.event.inputs.gitlab_token != ''
        run: |
          set -euo pipefail

          VCS_URL="${{ github.event.inputs.vcs_url }}"
          HOST="$(echo "$VCS_URL" | awk -F/ '{print $3}')"

          echo "Configuring GitLab token auth for host: $HOST"
          # GitLab PAT over HTTPS generally uses username 'oauth2'
          git config --global url."https://oauth2:${{ github.event.inputs.gitlab_token }}@$HOST/".insteadOf "https://$HOST/"
          git config --global credential.helper store

          echo "https://oauth2:${{ github.event.inputs.gitlab_token }}@$HOST" > ~/.git-credentials
          chmod 600 ~/.git-credentials

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -t rsa "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      # 5) Validate GitHub token and repository access (ONLY for GitHub URLs)
      - name: Validate GitHub token and repository access
        if: github.event.inputs.github_token != '' && contains(github.event.inputs.vcs_url, 'github.com')
        run: |
          set -euo pipefail

          OWNER=$(echo "${{ github.event.inputs.vcs_url }}" | sed -E 's|.*github\.com[:/]([^/]+)/.*|\1|')
          REPO=$(echo "${{ github.event.inputs.vcs_url }}" | sed -E 's|.*github\.com[:/][^/]+/([^/.]+).*|\1|')

          echo "Testing token access to: $OWNER/$REPO"

          if curl -s -H "Authorization: token ${{ github.event.inputs.github_token }}" \
            "https://api.github.com/repos/$OWNER/$REPO" | grep -q '"id"'; then
            echo "✓ Token is valid and has access to the repository"
          else
            echo "⚠ Token validation: repository may be public or token may not have access"
          fi

      # 6) Generic repo reachability check (works for GitHub + GitLab)
      - name: Validate repository is reachable (GitHub/GitLab)
        run: |
          set -euo pipefail

          echo "Checking repository reachability..."
          echo "VCS URL: ${{ github.event.inputs.vcs_url }}"
          git ls-remote -h "${{ github.event.inputs.vcs_url }}" >/dev/null
          echo "✓ Repository is reachable"

      # 7) Run ORT (uses INPUTS, not hardcoded)
      - name: Run ORT
        uses: oss-review-toolkit/ort-ci-github-action@v1
        env:
          # Pass whichever token the user provided; if none, keep empty (public repos)
          ORT_VCS_GIT_USERNAME: oauth2
          ORT_VCS_GIT_PASSWORD: ${{ github.event.inputs.github_token != '' && github.event.inputs.github_token || github.event.inputs.gitlab_token }}
          GIT_USERNAME: oauth2
          GIT_PASSWORD: ${{ github.event.inputs.github_token != '' && github.event.inputs.github_token || github.event.inputs.gitlab_token }}
        with:
          vcs-url: ${{ github.event.inputs.vcs_url }}
          vcs-revision: ${{ github.event.inputs.vcs_revision }}
          allow-dynamic-versions: 'true'
          run: >-
            cache-dependencies,
            labels,
            analyzer,
            scanner,
            advisor,
            evaluator,
            reporter,
            upload-results
          ort-cli-args: '-P ort.scanner.skipExcluded=true'
          ort-cli-scan-args: '--package-types=PROJECT'
