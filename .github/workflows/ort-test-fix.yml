name: ORT License Compliance Scan
on:  
  workflow_dispatch:
    inputs:
      vcs_url:
        description: 'Repository URL to scan.'
        required: true
        default: 'https://github.com/umm0/ort'
      github_token:
        description: 'GitHub Personal Access Token for private repository acces'
        required: false
        default: ''
jobs:
  ort-scan:
    runs-on: ubuntu-latest
    name: ORT License Compliance Check
    permissions:
      contents: read
      security-events: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0        
        path: ".ort-config"
        
    - name: Setup ORT configuration files
      run: |
        mkdir -p "$HOME/.ort/config"
        cp .ort-config/evaluator.rules.kts "$HOME/.ort/config/evaluator.rules.kts"
        cp .ort-config
